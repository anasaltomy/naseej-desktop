appId: com.naseej.pos
productName: Naseej POS
copyright: Copyright © 2024 Naseej

directories:
  output: dist
  buildResources: build

files:
  - out/**/*
  - "!node_modules/**/*.{md,txt,map}"

extraMetadata:
  main: out/main/index.js

mac:
  category: public.app-category.business
  icon: build/icon.icns
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
  window:
    width: 540
    height: 380

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  publisherName: Naseej

nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Naseej POS
  license: LICENSE

linux:
  icon: build/icons
  category: Office
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64

publish:
  provider: generic
  url: https://updates.naseej.sa/releases
